name: digital_cassette
description: A nostalgic cassette-style message app where users send YouTube songs with personal letters
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  
  # Routing
  go_router: ^12.0.0
  
  # HTTP & API
  dio: ^5.3.0
  pretty_dio_logger: ^1.3.1
  
  # Models & Serialization
  json_annotation: ^4.8.0
  freezed_annotation: ^2.4.1
  
  # Media
  image_picker: ^1.0.4
  youtube_player_iframe: ^5.2.0
  cached_network_image: ^3.3.0
  
  # Storage
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  
  # Authentication
  google_sign_in: ^6.2.1
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.0
  share_plus: ^7.2.0
  
  # Typography
  google_fonts: ^6.1.0
  
  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  freezed: ^2.4.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  # Uncomment and add font files to assets/fonts/ when ready
  # fonts:
  #   - family: Merriweather
  #     fonts:
  #       - asset: assets/fonts/Merriweather-Regular.ttf
